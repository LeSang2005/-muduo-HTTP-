<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 小说平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a3c 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }
        .register-wrapper { width: 100%; max-width: 460px; }
        .register-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .register-card h1 { color: #fff; font-size: 28px; margin-bottom: 5px; letter-spacing: 1px; }
        .register-card .subtitle { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        .form-section { text-align: left; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; color: #ccc; font-size: 13px; margin-bottom: 6px; font-weight: 500; }
        .input-group input[type="text"],
        .input-group input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff; font-size: 16px; outline: none;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            border-color: aqua;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .input-group input::placeholder { color: #666; }
        .radio-group { display: flex; align-items: center; gap: 25px; margin-bottom: 18px; }
        .radio-group label { color: #ccc; font-size: 13px; font-weight: 500; margin-right: 10px; }
        .radio-option { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #ddd; font-size: 15px; }
        .radio-option input[type="radio"] { accent-color: aqua; width: 16px; height: 16px; cursor: pointer; }
        .input-group textarea {
            width: 100%; padding: 14px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff; font-size: 16px; outline: none;
            resize: vertical; min-height: 120px; font-family: inherit;
        }
        .input-group textarea:focus {
            border-color: aqua;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }
        .btn-row { display: flex; gap: 15px; margin-top: 25px; }
        .btn {
            flex: 1; padding: 13px 0; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; text-align: center;
            text-decoration: none; display: inline-block;
        }
        .btn-submit { background: aqua; color: #000; }
        .btn-submit:hover { background: #00e6e6; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0, 255, 255, 0.3); }
        .btn-back { background: rgba(255, 255, 255, 0.15); color: #fff; border: 1px solid rgba(255, 255, 255, 0.25); }
        .btn-back:hover { background: rgba(255, 255, 255, 0.25); border-color: aqua; color: aqua; transform: translateY(-2px); }
        .register-footer { margin-top: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="register-card">
            <h1>📝 创建账号</h1>
            <p class="subtitle">注册成为小说平台的一员</p>
            <div class="form-section">
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="mima1" placeholder="请输入密码" required>
                </div>
                <div class="input-group">
                    <label>确认密码</label>
                    <input type="password" id="mima2" placeholder="请再一次输入密码" required>
                </div>
                <div class="input-group">
                    <label>姓名</label>
                    <input type="text" id="name1" placeholder="请输入名称">
                </div>
                <div class="radio-group">
                    <label>性别</label>
                    <div class="radio-option">
                        <input type="radio" name="sex" id="man" value="男">
                        <span>男</span>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="sex" id="woman" value="女">
                        <span>女</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>个人简介</label>
                    <textarea id="jieshao" placeholder="介绍一下自己吧..."></textarea>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-submit" id="sumbit">提交</button>
                <!-- 返回按钮使用相对路径，无需硬编码IP -->
                <a href="login.html" class="btn btn-back" id="backToLogin">返回</a>
            </div>
            <div class="register-footer">© 2026 小说平台 · 阅读无限</div>
        </div>
    </div>

    <script>
        // 动态获取基础URL，不再硬编码IP，也不加载外部配置文件
        var baseUrl = window.location.origin;

        // ========== 原有注册逻辑（仅将请求地址替换为baseUrl） ==========
        var mima1 = document.getElementById("mima1");
        var mima2 = document.getElementById("mima2");
        var name1 = document.getElementById("name1");
        var jieshao = document.getElementById("jieshao");
        var bit = document.getElementById("sumbit");

        bit.onclick = function() {
            var password1 = mima1.value;
            var password2 = mima2.value;
            if (password1 === "" || password2 === "") { alert("密码不能为空"); return; }
            if (password1 !== password2) { alert("密码不同，请重试"); return; }

            var sex_ = "";
            var sexNodes = document.getElementsByName("sex");
            for (var i = 0; i < sexNodes.length; i++) {
                if (sexNodes[i].checked) { sex_ = sexNodes[i].value; break; }
            }
            if (sex_ === "") { alert("请选择性别"); return; }

            var name_ = name1.value;
            if (name_ === "") { alert("姓名不能为空"); return; }

            var jieshao_ = jieshao.value;

            fetch(baseUrl + '/zhuche', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password1, sex: sex_, name: name_, jieshao: jieshao_ })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success === 1) {
                    alert("注册成功，请记住你的账号：" + data.username);
                } else {
                    alert("注册失败：" + (data.message || "未知错误"));
                }
            })
            .catch(err => { alert("网络或服务器错误"); console.error(err); });
        };
    </script>
</body>
</html>
