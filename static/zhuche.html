<!DOCTYPE html>

<html lang="zh">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>注册 · 小说平台</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js">

    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>

        /* ===== reset & base ===== */

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }

        body {

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;

            padding: 40px 20px;
            /* 核心修复：取消hidden，开启垂直滚动 */
            overflow-y: auto;
            overflow-x: hidden;

            position: relative;

            background: #0c0e14;

        }

        /* ===== 动态光晕背景 (与登录页完全一致) ===== */

        .bg-orbs {

            position: fixed;

            inset: 0;

            pointer-events: none;

            z-index: 0;

            overflow: hidden;

        }

        .bg-orbs .orb {

            position: absolute;

            border-radius: 50%;

            filter: blur(100px);

            opacity: 0.5;

            animation: orbFloat 18s ease-in-out infinite alternate;

        }

        .bg-orbs .orb:nth-child(1) {

            width: 600px;

            height: 600px;

            background: radial-gradient(circle, #6c5ce7, #a29bfe00);

            top: -15%;

            left: -10%;

            animation-duration: 22s;

        }

        .bg-orbs .orb:nth-child(2) {

            width: 500px;

            height: 500px;

            background: radial-gradient(circle, #00b894, #00b89400);

            bottom: -20%;

            right: -10%;

            animation-duration: 26s;

            animation-delay: -6s;

        }

        .bg-orbs .orb:nth-child(3) {

            width: 400px;

            height: 400px;

            background: radial-gradient(circle, #fd79a8, #fd79a800);

            top: 50%;

            left: 50%;

            transform: translate(-50%, -50%);

            animation-duration: 20s;

            animation-delay: -10s;

        }

        @keyframes orbFloat {

            0% {

                transform: translate(0, 0) scale(1);

            }

            33% {

                transform: translate(40px, -30px) scale(1.1);

            }

            66% {

                transform: translate(-20px, 40px) scale(0.9);

            }

            100% {

                transform: translate(30px, -20px) scale(1.05);

            }

        }

        /* ===== 微粒子 ===== */

        .particles {

            position: fixed;

            inset: 0;

            pointer-events: none;

            z-index: 1;

        }

        .particle {

            position: absolute;

            border-radius: 50%;

            background: rgba(255, 255, 255, 0.06);

            animation: floatUp linear infinite;

            bottom: -60px;

        }

        @keyframes floatUp {

            0% {

                transform: translateY(0) scale(1);

                opacity: 0;

            }

            10% {

                opacity: 0.3;

            }

            90% {

                opacity: 0.3;

            }

            100% {

                transform: translateY(-110vh) scale(0.3);

                opacity: 0;

            }

        }

        /* ===== 主容器 ===== */

        #app {

            width: 100%;

            max-width: 480px;

            position: relative;

            z-index: 10;

        }

        /* ===== 卡片 (深色毛玻璃) ===== */

        .register-card {

            background: rgba(255, 255, 255, 0.04);

            backdrop-filter: blur(40px) saturate(1.4);

            -webkit-backdrop-filter: blur(40px) saturate(1.4);

            border-radius: 32px;

            padding: 44px 36px 40px;

            border: 1px solid rgba(255, 255, 255, 0.07);

            box-shadow:

                0 40px 80px rgba(0, 0, 0, 0.5),

                inset 0 1px 0 rgba(255, 255, 255, 0.06);

            text-align: center;

            animation: cardEntry 0.8s cubic-bezier(0.22, 1, 0.36, 1);

            transition: box-shadow 0.4s ease;

        }

        .register-card:hover {

            box-shadow:

                0 50px 100px rgba(0, 0, 0, 0.6),

                inset 0 1px 0 rgba(255, 255, 255, 0.08);

        }

        @keyframes cardEntry {

            0% {

                opacity: 0;

                transform: translateY(40px) scale(0.96);

            }

            100% {

                opacity: 1;

                transform: translateY(0) scale(1);

            }

        }

        /* ===== Logo (颜色调整为登录页同款紫蓝) ===== */

        .logo-icon {

            font-size: 48px;

            margin-bottom: 12px;

            color: #6c5ce7;

            filter: drop-shadow(0 8px 15px rgba(108, 92, 231, 0.3));

            display: inline-block;

            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);

            cursor: pointer;

            animation: logoFloat 3s ease-in-out infinite;

        }

        .logo-icon:hover {

            transform: scale(1.2) rotate(-8deg);

            color: #a29bfe;

            filter: drop-shadow(0 14px 25px rgba(108, 92, 231, 0.5));

            animation-play-state: paused;

        }

        @keyframes logoFloat {

            0%, 100% { transform: translateY(0); }

            50% { transform: translateY(-7px); }

        }

        .register-card h1 {

            color: #fff;

            font-size: 28px;

            font-weight: 700;

            letter-spacing: -0.3px;

            margin-bottom: 4px;

            background: linear-gradient(135deg, #ffffff 60%, rgba(255, 255, 255, 0.6));

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

            background-clip: text;

        }

        .register-card .subtitle {

            color: rgba(255, 255, 255, 0.45);

            font-size: 14px;

            font-weight: 400;

            margin-bottom: 28px;

            letter-spacing: 0.2px;

        }

        /* ===== 输入组 (深色适配) ===== */

        .input-group {

            margin-bottom: 18px;

            text-align: left;

            position: relative;

        }

        .input-group label {

            display: flex;

            align-items: center;

            gap: 6px;

            color: rgba(255, 255, 255, 0.5);

            font-size: 13px;

            font-weight: 500;

            margin-bottom: 6px;

            letter-spacing: 0.2px;

        }

        .input-group label i {

            font-size: 13px;

            color: rgba(255, 255, 255, 0.3);

        }

        .input-wrapper {

            position: relative;

            display: flex;

            align-items: center;

        }

        .input-group input[type="text"],

        .input-group input[type="password"],

        .input-group textarea {

            width: 100%;

            padding: 14px 16px 14px 46px;

            background: rgba(255, 255, 255, 0.05);

            border: 1.5px solid rgba(255, 255, 255, 0.08);

            border-radius: 16px;

            color: #fff;

            font-size: 15px;

            font-family: inherit;

            transition: all 0.3s ease;

            outline: none;

            backdrop-filter: blur(8px);

        }

        .input-group textarea {

            padding-left: 16px;

            resize: vertical;

            min-height: 100px;

            line-height: 1.6;

        }

        .input-group input:focus,

        .input-group textarea:focus {

            border-color: rgba(108, 92, 231, 0.5);

            background: rgba(255, 255, 255, 0.07);

            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.08);

        }

        .input-group input::placeholder,

        .input-group textarea::placeholder {

            color: rgba(255, 255, 255, 0.2);

            font-weight: 300;

        }

        .input-group input:-webkit-autofill {

            -webkit-box-shadow: 0 0 0 1000px #1a1c26 inset !important;

            -webkit-text-fill-color: #fff !important;

        }

        .input-wrapper .input-icon {

            position: absolute;

            left: 16px;

            color: rgba(255, 255, 255, 0.2);

            font-size: 16px;

            transition: color 0.3s;

            pointer-events: none;

        }

        .input-group input:focus~.input-icon {

            color: rgba(108, 92, 231, 0.7);

        }

        .password-toggle {

            position: absolute;

            right: 14px;

            color: rgba(255, 255, 255, 0.2);

            cursor: pointer;

            font-size: 16px;

            transition: all 0.25s ease;

            background: none;

            border: none;

            padding: 4px;

            border-radius: 8px;

        }

        .password-toggle:hover {

            color: rgba(255, 255, 255, 0.6);

            background: rgba(255, 255, 255, 0.04);

            transform: scale(1.05);

        }

        /* ===== 性别选择 (深色适配) ===== */

        .gender-group {

            margin-bottom: 18px;

            text-align: left;

        }

        .gender-group label {

            display: flex;

            align-items: center;

            gap: 6px;

            color: rgba(255, 255, 255, 0.5);

            font-size: 13px;

            font-weight: 500;

            margin-bottom: 8px;

        }

        .gender-group label i {

            font-size: 13px;

            color: rgba(255, 255, 255, 0.3);

        }

        .gender-options {

            display: flex;

            gap: 12px;

        }

        .gender-option {

            flex: 1;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 8px;

            padding: 12px;

            background: rgba(255, 255, 255, 0.04);

            border: 1.5px solid rgba(255, 255, 255, 0.06);

            border-radius: 14px;

            cursor: pointer;

            transition: all 0.3s ease;

            color: rgba(255, 255, 255, 0.4);

            font-weight: 500;

            user-select: none;

        }

        .gender-option:hover {

            background: rgba(255, 255, 255, 0.07);

            border-color: rgba(255, 255, 255, 0.12);

            color: rgba(255, 255, 255, 0.7);

        }

        .gender-option.active {

            background: rgba(108, 92, 231, 0.15);

            border-color: #6c5ce7;

            color: #fff;

            box-shadow: 0 0 20px rgba(108, 92, 231, 0.1);

        }

        .gender-option i {

            font-size: 18px;

        }

        /* ===== 错误信息 (保持红白风格) ===== */

        .error-message {

            color: #ff6b6b;

            font-size: 12.5px;

            margin-top: 5px;

            padding-left: 4px;

            display: flex;

            align-items: center;

            gap: 5px;

            animation: shakeError 0.4s ease;

            background: rgba(255, 107, 107, 0.06);

            border-radius: 10px;

            padding: 4px 12px;

            border: 1px solid rgba(255, 107, 107, 0.08);

        }

        @keyframes shakeError {

            0%, 100% { transform: translateX(0); }

            20% { transform: translateX(-6px); }

            40% { transform: translateX(6px); }

            60% { transform: translateX(-4px); }

            80% { transform: translateX(4px); }

        }

        /* 按钮样式完全未改动 */

        .btn-row {

            display: flex;

            gap: 15px;

            margin-top: 25px;

        }

        .btn {

            flex: 1;

            padding: 14px 0;

            border: none;

            border-radius: 18px;

            font-size: 16px;

            font-weight: 700;

            cursor: pointer;

            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);

            text-align: center;

            text-decoration: none;

            display: inline-flex;

            align-items: center;

            justify-content: center;

            gap: 8px;

            letter-spacing: 0.4px;

            position: relative;

            overflow: hidden;

        }

        /* 提交按钮 */

        .btn-submit {

            background: linear-gradient(135deg, #3a7bd5, #5b9cf5);

            color: #ffffff;

            box-shadow: 0 10px 25px rgba(58, 123, 213, 0.35);

        }

        .btn-submit:hover:not(:disabled) {

            transform: translateY(-3px);

            box-shadow: 0 18px 35px rgba(58, 123, 213, 0.45);

            background: linear-gradient(135deg, #2b5fbd, #4a8ae0);

        }

        .btn-submit:active:not(:disabled) {

            transform: translateY(1px);

            box-shadow: 0 6px 15px rgba(58, 123, 213, 0.4);

        }

        .btn-submit:disabled {

            opacity: 0.7;

            cursor: not-allowed;

            filter: grayscale(10%);

        }

        /* 返回按钮 */

        .btn-back {

            background: rgba(255, 255, 255, 0.7);

            color: #1e293b;

            border: 1.5px solid rgba(180, 200, 230, 0.7);

            backdrop-filter: blur(10px);

            font-weight: 600;

        }

        .btn-back:hover {

            background: rgba(255, 255, 255, 0.95);

            border-color: #3a7bd5;

            color: #3a7bd5;

            transform: translateY(-3px);

            box-shadow: 0 10px 25px rgba(58, 123, 213, 0.15);

        }

        .spinner {

            display: inline-block;

            width: 18px;

            height: 18px;

            border: 2px solid rgba(255, 255, 255, 0.3);

            border-top-color: #ffffff;

            border-radius: 50%;

            animation: spin 0.8s linear infinite;

        }

        @keyframes spin {

            to { transform: rotate(360deg); }

        }

        .register-footer {

            margin-top: 25px;

            color: rgba(255, 255, 255, 0.2);

            font-size: 13px;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 5px;

            font-weight: 400;

        }

        .register-footer i {

            font-size: 12px;

            color: rgba(255, 255, 255, 0.15);

        }

        @media (max-width: 480px) {

            .register-card {

                padding: 35px 25px;

                border-radius: 30px;

            }

            .btn-row {

                flex-direction: column;

                gap: 12px;

            }

        }

    </style>

</head>

<body>

    <!-- 动态光晕 -->

    <div class="bg-orbs">

        <div class="orb"></div>

        <div class="orb"></div>

        <div class="orb"></div>

    </div>

    <!-- 粒子 -->

    <div class="particles" id="particles"></div>

    <!-- ===== Vue 应用 ===== -->

    <div id="app">

        <div class="register-card">

            <div class="logo-icon">

                <i class="fas fa-user-plus"></i>

            </div>

            <h1>创建账号</h1>

            <p class="subtitle">注册成为小说平台的一员</p>

            <div class="form-section">

                <!-- 密码 -->

                <div class="input-group">

                    <label><i class="fas fa-lock"></i> 密码</label>

                    <div class="input-wrapper">

                        <input 

                            :type="showPassword1 ? 'text' : 'password'" 

                            v-model="password1" 

                            placeholder="请输入密码" 

                            @input="clearError('password1')"

                        >

                        <i class="fas fa-lock input-icon"></i>

                        <button class="password-toggle" @click="showPassword1 = !showPassword1" type="button" :title="showPassword1 ? '隐藏密码' : '显示密码'">

                            <i class="fas" :class="showPassword1 ? 'fa-eye-slash' : 'fa-eye'"></i>

                        </button>

                    </div>

                    <div v-if="errors.password1" class="error-message">

                        <i class="fas fa-exclamation-circle"></i> {{ errors.password1 }}

                    </div>

                </div>

                <!-- 确认密码 -->

                <div class="input-group">

                    <label><i class="fas fa-check-circle"></i> 确认密码</label>

                    <div class="input-wrapper">

                        <input 

                            :type="showPassword2 ? 'text' : 'password'" 

                            v-model="password2" 

                            placeholder="请再一次输入密码" 

                            @input="clearError('password2')"

                        >

                        <i class="fas fa-check-circle input-icon"></i>

                        <button class="password-toggle" @click="showPassword2 = !showPassword2" type="button" :title="showPassword2 ? '隐藏密码' : '显示密码'">

                            <i class="fas" :class="showPassword2 ? 'fa-eye-slash' : 'fa-eye'"></i>

                        </button>

                    </div>

                    <div v-if="errors.password2" class="error-message">

                        <i class="fas fa-exclamation-circle"></i> {{ errors.password2 }}

                    </div>

                </div>

                <!-- 姓名 -->

                <div class="input-group">

                    <label><i class="fas fa-user"></i> 姓名</label>

                    <div class="input-wrapper">

                        <input 

                            type="text" 

                            v-model="name" 

                            placeholder="请输入名称" 

                            @input="clearError('name')"

                        >

                        <i class="fas fa-user input-icon"></i>

                    </div>

                    <div v-if="errors.name" class="error-message">

                        <i class="fas fa-exclamation-circle"></i> {{ errors.name }}

                    </div>

                </div>

                <!-- 性别 -->

                <div class="gender-group">

                    <label><i class="fas fa-venus-mars"></i> 性别</label>

                    <div class="gender-options">

                        <div 

                            class="gender-option" 

                            :class="{ active: gender === '男' }"

                            @click="gender = '男'; clearError('gender')"

                        >

                            <i class="fas fa-male"></i> 男

                        </div>

                        <div 

                            class="gender-option" 

                            :class="{ active: gender === '女' }"

                            @click="gender = '女'; clearError('gender')"

                        >

                            <i class="fas fa-female"></i> 女

                        </div>

                    </div>

                    <div v-if="errors.gender" class="error-message" style="margin-top:8px;">

                        <i class="fas fa-exclamation-circle"></i> {{ errors.gender }}

                    </div>

                </div>

                <!-- 个人简介 -->

                <div class="input-group">

                    <label><i class="fas fa-pen"></i> 个人简介</label>

                    <textarea 

                        v-model="bio" 

                        placeholder="介绍一下自己吧..."

                    ></textarea>

                </div>

            </div>

            <!-- 按钮行 完全保留原样 -->

            <div class="btn-row">

                <button class="btn btn-submit" @click="handleSubmit" :disabled="loading">

                    <span v-if="loading" class="spinner"></span>

                    <i v-else class="fas fa-paper-plane"></i>

                    {{ loading ? '提交中...' : '提交' }}

                </button>

                <a href="login.html" class="btn btn-back">

                    <i class="fas fa-arrow-left"></i> 返回

                </a>

            </div>

            <div class="register-footer">

                <i class="far fa-copyright"></i> 2026 小说平台 · 阅读无限

            </div>

        </div>

    </div>

    <script>

        // ===== 粒子生成 (深色适配) =====

        (function() {

            const container = document.getElementById('particles');

            for (let i = 0; i < 25; i++) {

                const el = document.createElement('div');

                el.className = 'particle';

                const size = Math.random() * 6 + 2;

                el.style.width = size + 'px';

                el.style.height = size + 'px';

                el.style.left = Math.random() * 100 + '%';

                el.style.animationDuration = Math.random() * 16 + 12 + 's';

                el.style.animationDelay = Math.random() * 12 + 's';

                el.style.background = `rgba(255,255,255,${Math.random() * 0.04 + 0.02})`;

                container.appendChild(el);

            }

        })();

        // ===== Vue 逻辑无修改 =====

        const { createApp } = Vue;

        createApp({

            data() {

                return {

                    password1: '',

                    password2: '',

                    name: '',

                    gender: '',

                    bio: '',

                    loading: false,

                    showPassword1: false,

                    showPassword2: false,

                    errors: {

                        password1: '',

                        password2: '',

                        name: '',

                        gender: ''

                    },

                    baseUrl: window.location.origin

                }

            },

            methods: {

                clearError(field) {

                    if (field && this.errors.hasOwnProperty(field)) {

                        this.errors[field] = '';

                    }

                },

                validate() {

                    let isValid = true;

                    this.errors = {

                        password1: '',

                        password2: '',

                        name: '',

                        gender: ''

                    };

                    if (!this.password1) {

                        this.errors.password1 = '密码不能为空';

                        isValid = false;

                    } else if (this.password1.length < 6) {

                        this.errors.password1 = '密码长度不能少于6位';

                        isValid = false;

                    }

                    if (!this.password2) {

                        this.errors.password2 = '请确认密码';

                        isValid = false;

                    } else if (this.password1 !== this.password2) {

                        this.errors.password2 = '两次密码不一致';

                        isValid = false;

                    }

                    if (!this.name.trim()) {

                        this.errors.name = '姓名不能为空';

                        isValid = false;

                    }

                    if (!this.gender) {

                        this.errors.gender = '请选择性别';

                        isValid = false;

                    }

                    return isValid;

                },

                async handleSubmit() {

                    if (!this.validate()) return;

                    this.loading = true;

                    try {

                        const response = await fetch(this.baseUrl + '/zhuche', {

                            method: 'POST',

                            headers: {

                                'Content-Type': 'application/json'

                            },

                            body: JSON.stringify({

                                password: this.password1,

                                sex: this.gender,

                                name: this.name.trim(),

                                jieshao: this.bio.trim()

                            })

                        });

                        const data = await response.json();

                        if (data.success === 1) {

                            alert('注册成功，请记住你的账号：' + data.username);

                        } else {

                            alert('注册失败：' + (data.message || '未知错误'));

                        }

                    } catch (error) {

                        console.error('注册请求失败:', error);

                        alert('网络或服务器错误，请稍后重试');

                    } finally {

                        this.loading = false;

                    }

                }

            }

        }).mount('#app');

    </script>

</body>

</html>
