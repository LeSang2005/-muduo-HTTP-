<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核详情 - 小说平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1e1e2f 0%, #2a2a3c 100%); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        #headtop { width: 100%; height: 50px; background: rgba(0,0,0,0.65); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; box-sizing: border-box; backdrop-filter: blur(6px); position: sticky; top: 0; z-index: 10; }
        #headtop a { background: aqua; padding: 8px 20px; border-radius: 20px; color: #000; text-decoration: none; font-weight: bold; transition: background 0.2s; font-size: 15px; }
        #headtop a:hover { background: #00cccc; }
        .container { width: 90%; max-width: 800px; margin: 30px 0; display: flex; flex-direction: column; gap: 20px; }
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        h1 { text-align: center; color: aqua; font-size: 26px; margin-bottom: 5px; }
        .sub-info { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .info-label { font-weight: bold; color: #ccc; margin-bottom: 8px; font-size: 15px; }
        .title-display { background: rgba(0,0,0,0.3); padding: 12px 16px; border-radius: 10px; font-size: 18px; font-weight: bold; color: aqua; border: 1px solid rgba(255,255,255,0.1); }
        .content-display { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; font-size: 16px; line-height: 1.8; white-space: pre-wrap; min-height: 300px; border: 1px solid rgba(255,255,255,0.1); color: #ddd; }
        .btn-row { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .btn { padding: 12px 30px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .btn-approve { background: aqua; color: #000; }
        .btn-approve:hover { background: #00e6e6; }
        .btn-reject { background: rgba(255,100,100,0.3); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .btn-reject:hover { background: rgba(255,100,100,0.5); }
    </style>
</head>
<body>
    <div id="headtop">
        <a href="person.html">👤 个人页面</a>
        <a href="menu.html">📚 返回书城</a>
    </div>

    <div class="container">
        <h1>📄 章节审核</h1>
        <p class="sub-info">
            审核员ID：<span id="reviewerIdDisplay">---</span> | 
            书籍ID：<span id="bookIdDisplay">---</span> | 
            章节号：<span id="chapterNumDisplay">---</span>
        </p>

        <div class="card">
            <div class="info-label">章节标题</div>
            <div class="title-display" id="chapterTitle">加载中...</div>
        </div>

        <div class="card">
            <div class="info-label">章节正文</div>
            <div class="content-display" id="chapterContent">加载中...</div>
        </div>

        <div class="btn-row">
            <button class="btn btn-approve" id="approveBtn">✅ 通过</button>
            <button class="btn btn-reject" id="rejectBtn">❌ 拒绝</button>
        </div>
    </div>

    <script>
        var baseUrl = window.location.origin;
        var urlParams = new URLSearchParams(window.location.search);
        var userId = urlParams.get('userid') || '未提供';
        var bookId = urlParams.get('book_id') || '未提供';
        var chapterNum = urlParams.get('chapter_num') || '未提供';

        document.getElementById('reviewerIdDisplay').textContent = userId;
        document.getElementById('bookIdDisplay').textContent = bookId;
        document.getElementById('chapterNumDisplay').textContent = chapterNum;

        // 加载章节内容（修正接口和参数）
        function loadChapterContent() {
            if (!bookId || !chapterNum) {
                document.getElementById('chapterContent').textContent = '参数缺失';
                return;
            }
            // 注意：你的 /readchapter 接口需要 book_id 和 chapter_id (cid)
            fetch(baseUrl + '/readchapter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ book_id: bookId, chapter_id: chapterNum })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success === 1) {
                    document.getElementById('chapterTitle').textContent = data.title || '未知标题';
                    document.getElementById('chapterContent').textContent = data.content || '（无内容）';
                } else {
                    document.getElementById('chapterContent').textContent = '加载失败：' + (data.message || '');
                }
            })
            .catch(() => {
                document.getElementById('chapterContent').textContent = '网络错误';
            });
        }

        // 审核操作（保持不变）
        function reviewAction(action) {
            fetch(baseUrl + '/review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userid: userId,
                    book_id: bookId,
                    chapter_num: chapterNum,
                    action: action
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success === 1) {
                    alert('操作成功');
                    window.location.href = 'check.html?userid=' + userId;
                } else {
                    alert('操作失败：' + (data.message || ''));
                }
            })
            .catch(() => alert('网络错误'));
        }

        document.getElementById('approveBtn').onclick = function() { reviewAction('approve'); };
        document.getElementById('rejectBtn').onclick = function() { reviewAction('reject'); };

        loadChapterContent();
    </script>
</body>
</html>
