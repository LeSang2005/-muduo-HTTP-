<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书城</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0F172A, #1E293B);
            min-height: 100vh;
            color: #f1f5f9;
        }
        #headtop {
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 99;
        }
        #person {
            cursor: pointer;
            background: linear-gradient(135deg, #22d3ee, #06b6d4);
            padding: 9px 20px;
            border-radius: 24px;
            color: #0F172A;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        #person:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(6, 182, 212, 0.35);
        }
        .search-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .search-input {
            height: 38px;
            padding: 0 18px;
            border-radius: 20px;
            border: none;
            outline: none;
            font-size: 14px;
            min-width: 260px;
            background: rgba(255,255,255,0.92);
            transition: all 0.3s;
        }
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.4);
        }
        #find {
            background: linear-gradient(135deg, #22d3ee, #06b6d4);
            padding: 9px 22px;
            border-radius: 24px;
            color: #0F172A;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        #find:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(6, 182, 212, 0.35);
        }
        .divider {
            border: none;
            height: 3px;
            background: linear-gradient(90deg, transparent, #22d3ee, transparent);
            margin: 12px 0;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 26px;
            max-width: 1200px;
            margin: 45px auto;
            padding: 0 24px;
        }
        .book-card {
            width: 100%;
            max-width: 160px;
            background: rgba(255,255,255,0.94);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 6px 22px rgba(0,0,0,0.28);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.2,1,0.2,1);
        }
        .book-card:hover {
            transform: translateY(-10px) scale(1.04);
            box-shadow: 0 14px 36px rgba(0,0,0,0.38);
        }
        .book-cover {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #fff;
        }
        .cover-1 { background: linear-gradient(145deg, #4F46E5, #818CF8); }
        .cover-2 { background: linear-gradient(145deg, #DB2777, #F472B6); }
        .cover-3 { background: linear-gradient(145deg, #059669, #34D399); }
        .cover-4 { background: linear-gradient(145deg, #D97706, #FBBF24); }
        .cover-5 { background: linear-gradient(145deg, #1D4ED8, #60A5FA); }
        .book-info {
            padding: 12px 10px 16px;
            text-align: center;
        }
        .book-title {
            font-weight: 600;
            margin-bottom: 7px;
            font-size: 15px;
            color: #0F172A;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .book-author {
            color: #475569;
            font-size: 12px;
        }
        .empty-tip {
            grid-column: 1 / -1;
            text-align: center;
            padding: 90px 0;
            font-size: 20px;
            opacity: 0.75;
        }
        .loading {
            text-align: center;
            padding: 70px 0;
            font-size: 18px;
        }
        .page-box {
            max-width: 1200px;
            margin: 30px auto 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .page-btn {
            padding: 8px 22px;
            border-radius: 20px;
            border: 1px solid #22d3ee;
            background: transparent;
            color: #22d3ee;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
        }
        .page-btn:hover:not(:disabled) {
            background: #22d3ee;
            color: #0F172A;
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .page-text {
            font-size: 16px;
        }
        @media (max-width: 1024px) {
            .book-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 640px) {
            #headtop {
                padding: 14px 20px;
                flex-direction: column;
                height: auto;
                gap: 14px;
            }
            .search-input {
                min-width: 180px;
            }
            .book-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }
            .page-box {
                gap: 10px;
            }
            .page-btn {
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="headtop">
        <div id="person" @click="goPerson">
            <i class="fas fa-user"></i>个人信息
        </div>
        <div class="search-wrap">
            <input class="search-input" v-model="searchKey" placeholder="请输入搜索的书本名" @keyup.enter="searchBook">
            <div id="find" @click="searchBook">
                <i class="fas fa-search"></i>搜索
            </div>
        </div>
    </div>
    <hr class="divider">

    <div class="book-grid" v-if="!loading">
        <div class="empty-tip" v-if="bookList.length === 0">
            <i class="fas fa-book-open fa-2x"></i>
            <p style="margin-top:12px">暂无匹配书籍</p>
        </div>
        <div class="book-card" v-else v-for="(book, idx) in bookList" :key="book.id" @click="goBookDetail(book)">
            <div class="book-cover" :class="`cover-${(idx % 5) + 1}`">
                <i class="fas fa-book"></i>
            </div>
            <div class="book-info">
                <div class="book-title">{{ book.bname || '未知书名' }}</div>
                <div class="book-author">{{ book.author || '佚名' }}</div>
            </div>
        </div>
    </div>

    <div class="loading" v-if="loading">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
        <p style="margin-top:10px">书籍加载中...</p>
    </div>

    <!-- 分页栏始终显示（只要非加载状态），按钮根据条件禁用 -->
    <div class="page-box" v-if="!loading">
        <button class="page-btn" :disabled="currentPage <= 1" @click="prevPage">← 上一页</button>
        <span class="page-text">第 {{ currentPage }} 页</span>
        <button class="page-btn" :disabled="!hasNextPage" @click="nextPage">下一页 →</button>
    </div>
</div>

<script>
const { createApp, ref, onMounted } = Vue;
createApp({
    setup() {
        const baseUrl = window.location.origin;
        const userId = sessionStorage.getItem('userId');
        if (!userId) {
            window.location.href = baseUrl + '/login.html';
        }

        const bookList = ref([]);
        const loading = ref(false);
        const searchKey = ref('');
        const pageSize = 10;
        const currentPage = ref(1);
        const hasNextPage = ref(true);

        const goPerson = () => {
            window.location.href = baseUrl + '/person.html';
        };
        const goBookDetail = (book) => {
            const bookId = book.id;
            const bookName = book.bname;
            sessionStorage.setItem('userId', userId);
            window.location.href = 'book.html?name=' + encodeURIComponent(bookName) + '&id=' + bookId;
        };

        const loadBooks = async (isSearch = false) => {
            loading.value = true;
            try {
                let apiUrl, reqBody;
                if (isSearch) {
                    apiUrl = baseUrl + '/findbooks';
                    reqBody = {
                        username: userId,
                        search: searchKey.value.trim(),
                        page: currentPage.value,
                        size: pageSize
                    };
                } else {
                    apiUrl = baseUrl + '/booklist';
                    reqBody = {
                        page: currentPage.value,
                        size: pageSize
                    };
                }
                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqBody)
                });
                const data = await res.json();
                if (data.success === 1) {
                    const books = data.books || [];
                    bookList.value = books;
                    // 若返回数据量等于 pageSize，才认为可能有下一页
                    hasNextPage.value = (books.length === pageSize);
                } else {
                    alert('加载书籍失败');
                    bookList.value = [];
                    hasNextPage.value = false;
                }
            } catch (err) {
                console.error(err);
                alert('网络错误');
                bookList.value = [];
                hasNextPage.value = false;
            } finally {
                loading.value = false;
            }
        };

        const searchBook = () => {
            currentPage.value = 1;
            hasNextPage.value = true;
            if (searchKey.value.trim() === '') {
                loadBooks(false);
            } else {
                loadBooks(true);
            }
        };

        const prevPage = () => {
            if (currentPage.value > 1) {
                currentPage.value -= 1;
                if (searchKey.value.trim()) loadBooks(true);
                else loadBooks(false);
            }
        };

        const nextPage = () => {
            if (!hasNextPage.value) return;
            currentPage.value += 1;
            if (searchKey.value.trim()) loadBooks(true);
            else loadBooks(false);
        };

        onMounted(() => {
            loadBooks(false);
        });

        return {
            bookList, loading, searchKey, currentPage,
            hasNextPage,
            goPerson, goBookDetail, searchBook,
            prevPage, nextPage
        };
    }
}).mount('#app');
</script>
</body>
</html>
