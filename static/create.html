<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作中心 - 小说平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a3c 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #headtop {
            width: 100%;
            height: 50px;
            background: rgba(0, 0, 0, 0.65);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-sizing: border-box;
            backdrop-filter: blur(6px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #headtop a {
            background: aqua;
            padding: 8px 20px;
            border-radius: 20px;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
            font-size: 15px;
        }

        #headtop a:hover {
            background: #00cccc;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            color: aqua;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 150px;
        }

        .form-group.full-width {
            flex: 100%;
        }

        .form-group label {
            display: block;
            color: #ccc;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus,
        textarea:focus {
            border-color: aqua;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }

        input[type="file"] {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: aqua;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            margin-right: 10px;
            cursor: pointer;
        }

        .large-textarea {
            min-height: 150px;
            resize: vertical;
        }

        .btn-submit {
            margin-top: 10px;
            padding: 12px 30px;
            background: aqua;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: #00e6e6;
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            background: #008080;
            color: #ccc;
        }

        .user-id-display {
            text-align: center;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 14px;
        }

        .user-id-display span {
            color: aqua;
            font-weight: bold;
        }

        /* 书籍列表样式（新增） */
        .book-list-wrap {
            margin-top: 15px;
            min-height: 40px;
        }

        .book-item {
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
        }

        .book-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 255, 255, 0.25);
        }

        .book-item-title {
            font-size: 16px;
            font-weight: bold;
            color: aqua;
            margin-bottom: 4px;
        }

        .book-item-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
        }

        .empty-book {
            text-align: center;
            padding: 30px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }

        .empty-book .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .loading-text {
            text-align: center;
            padding: 20px 0;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: aqua;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <!-- 引入 mammoth.js 用于解析 docx 文件 -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js">
    </script>
</head>
<body>

    <div id="headtop">
        <a href="person.html">👤 个人页面</a>
        <a href="menu.html">📚 返回书城</a>
    </div>

    <div class="container">

        <div class="user-id-display">
            当前用户ID：<span id="currentUserId">---</span>
        </div>

        <!-- ==================== 我的全部书籍（新增模块） ==================== -->
        <div class="card">
            <h2>📚 我的全部书籍</h2>
            <button class="btn-submit" id="refreshBooksBtn" onclick="getMyBook()">
                🔄 刷新我的书籍
            </button>
            <div class="book-list-wrap" id="bookListWrap">
                <div class="loading-text">
                    <span class="spinner"></span> 正在加载书籍列表...
                </div>
            </div>
        </div>

        <!-- 创建书籍 -->
        <div class="card">
            <h2>📖 创建书籍</h2>
            <div class="form-group">
                <label>书籍名称</label>
                <input type="text" id="newBookTitle" placeholder="请输入新书名" style="padding: 16px; font-size: 18px;">
            </div>
            <div class="form-group">
                <label>书籍简介</label>
                <textarea id="newBookDesc" class="large-textarea" placeholder="一句话介绍（可选）"></textarea>
            </div>
            <button class="btn-submit" id="createBookBtn">创建书籍</button>
        </div>

        <!-- 修改简介 -->
        <div class="card">
            <h2>✏️ 修改简介</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>书本ID</label>
                    <input type="text" id="editDescBookId" placeholder="输入书本ID">
                </div>
                <div class="form-group">
                    <label>书本名</label>
                    <input type="text" id="editDescBookName" placeholder="输入书本名">
                </div>
            </div>
            <div class="form-group">
                <label>新简介</label>
                <textarea id="editDescContent" class="large-textarea" placeholder="请输入新的简介内容"></textarea>
            </div>
            <button class="btn-submit" id="editDescBtn">修改</button>
        </div>

        <!-- 上传章节 -->
        <div class="card">
            <h2>📝 上传章节</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>书籍 ID</label>
                    <input type="text" id="uploadBookId" placeholder="目标书籍ID">
                </div>
                <div class="form-group">
                    <label>章节号（数字）</label>
                    <input type="number" id="uploadChapterNum" placeholder="例如：3">
                </div>
                <div class="form-group">
                    <label>章节标题</label>
                    <input type="text" id="uploadChapterTitle" placeholder="请输入章节标题">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>选择章节文件</label>
                    <input type="file" id="uploadFilePath">
                </div>
            </div>
            <button class="btn-submit" id="uploadChapterBtn">上传章节</button>
        </div>

        <!-- 修改章节 -->
        <div class="card">
            <h2>✏️ 修改章节</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>书籍 ID</label>
                    <input type="text" id="editBookId" placeholder="书籍ID">
                </div>
                <div class="form-group">
                    <label>书本名</label>
                    <input type="text" id="editBookName" placeholder="书本名">
                </div>
                <div class="form-group">
                    <label>章节号</label>
                    <input type="number" id="editChapterNum" placeholder="章节号">
                </div>
            </div>
            <div class="form-group">
                <label>章节正文</label>
                <textarea id="editChapterContent" placeholder="在此编辑章节正文..." style="min-height: 200px; resize: vertical;"></textarea>
            </div>
            <button class="btn-submit" id="editChapterBtn">提交修改</button>
        </div>

    </div>

    <script>
        var baseUrl = window.location.origin;
        var userId = sessionStorage.getItem('userId');
        if (!userId) {
            window.location.href = baseUrl + '/login.html';
        }
        document.getElementById('currentUserId').textContent = userId;

        // 书籍列表加载状态
        var isBookLoading = false;

        // ==================== 获取我的全部书籍（新增） ====================
        function getMyBook() {
            if (isBookLoading) return;
            isBookLoading = true;
            var btn = document.getElementById('refreshBooksBtn');
            var wrap = document.getElementById('bookListWrap');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 加载中...';
            wrap.innerHTML = '<div class="loading-text"><span class="spinner"></span> 正在加载书籍列表...</div>';

            fetch(baseUrl + '/mybook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userId })
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success === 1 && data.books && data.books.length > 0) {
                        var html = '';
                        data.books.forEach(function(book) {
                            html +=
                                '<div class="book-item">' +
                                '<div class="book-item-title">📖 书籍ID：' + book.bid + ' | 书名：' + book.bname +
                                '</div>' +
                                '<div class="book-item-desc">简介：' + (book.desc || '暂无简介') + '</div>' +
                                '</div>';
                        });
                        wrap.innerHTML = html;
                    } else {
                        wrap.innerHTML =
                            '<div class="empty-book"><span class="icon">📭</span>暂无创建的书籍<br>前往下方创建新书</div>';
                    }
                })
                .catch(function(err) {
                    console.error(err);
                    wrap.innerHTML =
                        '<div class="empty-book"><span class="icon">⚠️</span>加载失败，请检查网络后重试</div>';
                })
                .finally(function() {
                    isBookLoading = false;
                    btn.disabled = false;
                    btn.innerHTML = '🔄 刷新我的书籍';
                });
        }

        // 页面加载时自动获取书籍列表
        getMyBook();

        // 公共函数：将提取的文本发送到后端
        function sendChapterData(content) {
            var bookId = document.getElementById("uploadBookId").value.trim();
            var chapterNum = document.getElementById("uploadChapterNum").value.trim();
            var chapterTitle = document.getElementById("uploadChapterTitle").value.trim();

            fetch(baseUrl + '/uploadchapter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: userId,
                        book_id: bookId,
                        chapter_num: chapterNum,
                        title: chapterTitle,
                        content: content
                    })
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success === 1) {
                        alert("上传成功！");
                        document.getElementById("uploadBookId").value = "";
                        document.getElementById("uploadChapterNum").value = "";
                        document.getElementById("uploadChapterTitle").value = "";
                        document.getElementById("uploadFilePath").value = "";
                    } else {
                        alert("上传失败：" + data.message);
                    }
                })
                .catch(function(err) { alert("网络错误"); });
        }

        // ==================== 创建书籍 ====================
        var createBookBtn = document.getElementById("createBookBtn");
        createBookBtn.onclick = function() {
            var newBookTitle = document.getElementById('newBookTitle').value;
            var newBookDesc = document.getElementById("newBookDesc").value;
            if (newBookTitle === "") {
                alert("新书名不能为空");
                return;
            }
            var btn = this;
            btn.disabled = true;
            btn.textContent = "创建中...";
            fetch(baseUrl + '/createbook', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "username": userId,
                        "bname": newBookTitle,
                        "desc": newBookDesc
                    })
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success == 1) {
                        alert("创建成功，你的新书id:" + data.bid);
                        document.getElementById('newBookTitle').value = "";
                        document.getElementById('newBookDesc').value = "";
                        // 创建成功后自动刷新书籍列表
                        getMyBook();
                    } else {
                        alert("创建失败：" + data.message);
                    }
                })
                .catch(function(err) { alert("网络错误"); })
                .finally(function() {
                    btn.disabled = false;
                    btn.textContent = "创建书籍";
                });
        };

        // ==================== 修改简介 ====================
        var editBtn = document.getElementById("editDescBtn");
        editBtn.onclick = function() {
            var editBookId = document.getElementById("editDescBookId").value;
            var editBookName = document.getElementById("editDescBookName").value;
            var editNewDescContent = document.getElementById("editDescContent").value;
            if (editBookId === "" || editBookName === "") {
                alert("书本ID和书名不能为空");
                return;
            }
            var btn = this;
            btn.disabled = true;
            btn.textContent = "修改中...";
            fetch(baseUrl + "/updateEdit", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "username": userId,
                        "bid": editBookId,
                        "bname": editBookName,
                        "edit": editNewDescContent
                    })
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success === 1) {
                        alert("修改成功");
                        document.getElementById("editDescBookId").value = "";
                        document.getElementById("editDescBookName").value = "";
                        document.getElementById("editDescContent").value = "";
                        // 修改简介成功后自动刷新书籍列表
                        getMyBook();
                    } else {
                        alert("修改失败，原因：" + data.message);
                    }
                })
                .catch(function(err) { alert("网络错误"); })
                .finally(function() {
                    btn.disabled = false;
                    btn.textContent = "修改";
                });
        };

        // ==================== 上传章节（优化异步流程） ====================
        var uploadChapterBtn = document.getElementById("uploadChapterBtn");
        uploadChapterBtn.onclick = function() {
            var bookId = document.getElementById("uploadBookId").value.trim();
            var chapterNum = document.getElementById("uploadChapterNum").value.trim();
            var chapterTitle = document.getElementById("uploadChapterTitle").value.trim();
            var fileInput = document.getElementById("uploadFilePath");
            var file = fileInput.files[0];

            if (!bookId || !chapterNum || !chapterTitle || !file) {
                alert("请填写所有字段并选择文件");
                return;
            }

            var fileName = file.name.toLowerCase();

            // 支持 .txt 和 .docx
            if (!fileName.endsWith(".txt") && !fileName.endsWith(".docx")) {
                alert("只支持上传 .txt 或 .docx 文件");
                return;
            }

            var btn = this;
            btn.disabled = true;
            btn.textContent = "上传中...";

            // 封装文件读取为 Promise，避免异步顺序问题
            function readFileContent(file) {
                return new Promise(function(resolve, reject) {
                    var reader = new FileReader();
                    reader.onerror = function() { reject(new Error("文件读取失败")); };
                    reader.onload = function(e) {
                        try {
                            if (fileName.endsWith(".txt")) {
                                resolve(e.target.result);
                            } else if (fileName.endsWith(".docx")) {
                                mammoth.extractRawText({ arrayBuffer: e.target.result })
                                    .then(function(result) { resolve(result.value); })
                                    .catch(function(err) { reject(new Error("解析 Word 文件失败：" + err
                                            .message)); });
                            }
                        } catch (err) {
                            reject(err);
                        }
                    };
                    if (fileName.endsWith(".txt")) {
                        reader.readAsText(file, "UTF-8");
                    } else {
                        reader.readAsArrayBuffer(file);
                    }
                });
            }

            readFileContent(file)
                .then(function(content) {
                    sendChapterData(content);
                })
                .catch(function(err) {
                    alert(err.message || "文件处理失败");
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.textContent = "上传章节";
                });
        };

        // ==================== 修改章节 ====================
        var editChapterBtn = document.getElementById("editChapterBtn");
        editChapterBtn.onclick = function() {
            var bookId = document.getElementById("editBookId").value.trim();
            var bookName = document.getElementById("editBookName").value.trim();
            var chapterNum = document.getElementById("editChapterNum").value.trim();
            var newContent = document.getElementById("editChapterContent").value;

            if (!bookId || !bookName || !chapterNum) {
                alert("书籍ID、书名、章节号不能为空");
                return;
            }
            if (!newContent) {
                alert("章节正文不能为空");
                return;
            }

            var btn = this;
            btn.disabled = true;
            btn.textContent = "提交中...";
            fetch(baseUrl + '/editchapter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: userId,
                        book_id: bookId,
                        chapter_num: chapterNum,
                        title: "第" + chapterNum + "章",
                        content: newContent
                    })
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success === 1) {
                        alert("修改成功！");
                        document.getElementById("editBookId").value = "";
                        document.getElementById("editBookName").value = "";
                        document.getElementById("editChapterNum").value = "";
                        document.getElementById("editChapterContent").value = "";
                    } else {
                        alert("修改失败：" + (data.message || "未知错误"));
                    }
                })
                .catch(function(err) { alert("网络错误"); })
                .finally(function() {
                    btn.disabled = false;
                    btn.textContent = "提交修改";
                });
        };
    </script>

</body>
</html>
