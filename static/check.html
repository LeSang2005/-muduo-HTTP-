<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核列表 - 小说平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1e1e2f 0%, #2a2a3c 100%); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        #headtop { width: 100%; height: 50px; background: rgba(0,0,0,0.65); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; box-sizing: border-box; backdrop-filter: blur(6px); position: sticky; top: 0; z-index: 10; }
        #headtop a { background: aqua; padding: 8px 20px; border-radius: 20px; color: #000; text-decoration: none; font-weight: bold; transition: background 0.2s; font-size: 15px; }
        #headtop a:hover { background: #00cccc; }
        .container { width: 90%; max-width: 900px; margin: 30px 0; }
        h1 { text-align: center; color: aqua; font-size: 28px; margin-bottom: 10px; }
        .user-info { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 30px; }
        .user-info span { color: aqua; font-weight: bold; }
        .review-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .table-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.2); font-weight: bold; color: aqua; font-size: 15px; }
        .table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; transition: background 0.2s; }
        .table-row:last-child { border-bottom: none; }
        .table-row:hover { background: rgba(255,255,255,0.05); }
        .book-title { font-size: 15px; font-weight: 500; }
        .chapter-num { color: #ccc; font-size: 14px; }
        .status-badge { font-size: 13px; background: rgba(255,170,0,0.2); color: #ffaa00; padding: 4px 12px; border-radius: 20px; display: inline-block; width: fit-content; }
        .action-btns { display: flex; gap: 8px; }
        .btn { padding: 8px 18px; border: none; border-radius: 10px; font-weight: bold; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .btn-approve { background: aqua; color: #000; }
        .btn-approve:hover { background: #00e6e6; }
        .btn-reject { background: rgba(255,100,100,0.3); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .btn-reject:hover { background: rgba(255,100,100,0.5); }
        .pagination { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .pagination button { padding: 8px 20px; background: rgba(255,255,255,0.2); border: 1px solid aqua; color: aqua; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .loading { text-align: center; padding: 30px; color: #ccc; }
        .desc-info { color: #aaa; font-size: 13px; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="headtop">
        <a href="person.html">👤 个人页面</a>
        <a href="menu.html">📚 返回书城</a>
    </div>

    <div class="container">
        <h1>🔍 内容审核</h1>
        <div class="user-info">审核员ID：<span id="reviewerIdDisplay">（从URL获取）</span></div>

        <!-- 章节审核卡片 -->
        <div class="review-card">
            <h2 style="color:aqua; margin-bottom:15px;">📖 章节审核</h2>
            <div class="table-header">
                <div>书籍 / 章节标题</div>
                <div>章节号</div>
                <div>状态</div>
                <div>操作</div>
            </div>
            <div id="chapterReviewList"></div>
            <div id="chapterPagination" class="pagination"></div>
        </div>

        <!-- 书籍审核卡片 -->
        <div class="review-card">
            <h2 style="color:aqua; margin-bottom:15px;">📚 书籍审核</h2>
            <div class="table-header">
                <div>书籍ID / 书名</div>
                <div>作者</div>
                <div>简介</div>
                <div>操作</div>
            </div>
            <div id="bookReviewList"></div>
            <div id="bookPagination" class="pagination"></div>
        </div>
    </div>

    <script>
        var baseUrl = window.location.origin;
        var urlParams = new URLSearchParams(window.location.search);
        var userId = urlParams.get('userid') || sessionStorage.getItem('userId');
        document.getElementById('reviewerIdDisplay').textContent = userId || '未提供';

        // ========== 章节审核逻辑（保留原有点击跳转功能） ==========
        var chapterCurrentPage = 1;
        var chapterTotalPages = 1;
        var chapterPageSize = 10;

        function loadChapterReviews(page) {
            var container = document.getElementById('chapterReviewList');
            container.innerHTML = '<div class="loading">加载中...</div>';

            // 数据发到后端 /reviewlist 接口
            fetch(baseUrl + '/reviewlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userid: userId, page: page, size: chapterPageSize })
            })
            .then(res => res.json())
            .then(data => {
                container.innerHTML = '';
                if (data.success === 1 && data.chapters && data.chapters.length > 0) {
                    data.chapters.forEach(function(ch) {
                        var row = document.createElement('div');
                        row.className = 'table-row';
                        row.innerHTML = `
                            <div class="book-title">${ch.book_name} · ${ch.title}</div>
                            <div class="chapter-num">第${ch.chapter_num}章</div>
                            <div><span class="status-badge">待审核</span></div>
                            <div class="action-btns">
                                <button class="btn btn-approve chapter-approve" data-bookid="${ch.book_id}" data-chapter="${ch.chapter_num}">通过</button>
                                <button class="btn btn-reject chapter-reject" data-bookid="${ch.book_id}" data-chapter="${ch.chapter_num}">拒绝</button>
                            </div>
                        `;
                        // ✅ 恢复点击行跳转到详情页
                        row.onclick = function(e) {
                            // 如果点击的是按钮，不跳转（让按钮自己的事件处理）
                            if (e.target.tagName === 'BUTTON') return;
                            window.location.href = 'checkbook.html?'
                                + 'userid=' + userId
                                + '&book_id=' + ch.book_id
                                + '&chapter_num=' + ch.chapter_num;
                        };
                        container.appendChild(row);
                    });
                    chapterTotalPages = data.totalPages || 1;
                } else {
                    container.innerHTML = '<div class="loading">暂无待审核章节</div>';
                    chapterTotalPages = 1;
                }
                chapterCurrentPage = page;
                renderChapterPagination();
            })
            .catch(err => {
                container.innerHTML = '<div class="loading">加载失败，请稍后重试</div>';
                console.error(err);
            });
        }

        // 为按钮绑定事件（事件委托方式，避免和行点击冲突）
        document.getElementById('chapterReviewList').addEventListener('click', function(e) {
            if (e.target.classList.contains('chapter-approve')) {
                var bookId = e.target.getAttribute('data-bookid');
                var chapterNum = e.target.getAttribute('data-chapter');
                reviewChapter(bookId, chapterNum, 'approve');
            }
            if (e.target.classList.contains('chapter-reject')) {
                var bookId = e.target.getAttribute('data-bookid');
                var chapterNum = e.target.getAttribute('data-chapter');
                reviewChapter(bookId, chapterNum, 'reject');
            }
        });

        function reviewChapter(bookId, chapterNum, action) {
            if (!confirm('确定要' + (action === 'approve' ? '通过' : '拒绝') + '该章节吗？')) return;
            // 数据发到后端 /review 接口
            fetch(baseUrl + '/review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userid: userId,
                    book_id: bookId,
                    chapter_num: chapterNum,
                    action: action
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success === 1) {
                    alert('操作成功');
                    loadChapterReviews(chapterCurrentPage);
                } else {
                    alert('操作失败：' + (data.message || ''));
                }
            })
            .catch(err => { console.error(err); alert('网络错误'); });
        }

        function renderChapterPagination() {
            var container = document.getElementById('chapterPagination');
            container.innerHTML = '';
            if (chapterTotalPages <= 1) return;
            container.innerHTML = `
                <button ${chapterCurrentPage <= 1 ? 'disabled' : ''} id="chapterPrevBtn">上一页</button>
                <span>第 ${chapterCurrentPage} / ${chapterTotalPages} 页</span>
                <button ${chapterCurrentPage >= chapterTotalPages ? 'disabled' : ''} id="chapterNextBtn">下一页</button>
            `;
            document.getElementById('chapterPrevBtn')?.addEventListener('click', function() {
                if (chapterCurrentPage > 1) loadChapterReviews(chapterCurrentPage - 1);
            });
            document.getElementById('chapterNextBtn')?.addEventListener('click', function() {
                if (chapterCurrentPage < chapterTotalPages) loadChapterReviews(chapterCurrentPage + 1);
            });
        }

        // ========== 书籍审核逻辑 ==========
        var bookCurrentPage = 1;
        var bookTotalPages = 1;
        var bookPageSize = 10;

        function loadBookReviews(page) {
            var container = document.getElementById('bookReviewList');
            container.innerHTML = '<div class="loading">加载中...</div>';
            // 数据发到后端 /bookreviewlist 接口
            fetch(baseUrl + '/bookreviewlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userid: userId, page: page, size: bookPageSize })
            })
            .then(res => res.json())
            .then(data => {
                container.innerHTML = '';
                if (data.success === 1 && data.books && data.books.length > 0) {
                    data.books.forEach(function(book) {
                        var row = document.createElement('div');
                        row.className = 'table-row';
                        row.innerHTML = `
                            <div><div class="book-title">#${book.bid} ${book.bookname || '未知书名'}</div></div>
                            <div>${book.author || '佚名'}</div>
                            <div class="desc-info">${book.description || '暂无简介'}</div>
                            <div class="action-btns">
                                <button class="btn btn-approve book-approve" data-bookid="${book.bid}">通过</button>
                                <button class="btn btn-reject book-reject" data-bookid="${book.bid}">拒绝</button>
                            </div>
                        `;
                        container.appendChild(row);
                    });
                    bookTotalPages = data.totalPages || 1;
                } else {
                    container.innerHTML = '<div class="loading">暂无待审核书籍</div>';
                    bookTotalPages = 1;
                }
                bookCurrentPage = page;
                renderBookPagination();
            })
            .catch(err => {
                container.innerHTML = '<div class="loading">加载失败，请稍后重试</div>';
                console.error(err);
            });
        }

        // 书籍审核按钮事件委托
        document.getElementById('bookReviewList').addEventListener('click', function(e) {
            if (e.target.classList.contains('book-approve')) {
                var bookId = e.target.getAttribute('data-bookid');
                reviewBook(bookId, 'approve');
            }
            if (e.target.classList.contains('book-reject')) {
                var bookId = e.target.getAttribute('data-bookid');
                reviewBook(bookId, 'reject');
            }
        });

        function reviewBook(bookId, action) {
            if (!confirm('确定要' + (action === 'approve' ? '通过' : '拒绝') + '该书籍吗？')) return;
            // 数据发到后端 /bookreview 接口
            fetch(baseUrl + '/bookreview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userid: userId,
                    book_id: bookId,
                    action: action
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success === 1) {
                    alert('操作成功');
                    loadBookReviews(bookCurrentPage);
                } else {
                    alert('操作失败：' + (data.message || ''));
                }
            })
            .catch(err => { console.error(err); alert('网络错误'); });
        }

        function renderBookPagination() {
            var container = document.getElementById('bookPagination');
            container.innerHTML = '';
            if (bookTotalPages <= 1) return;
            container.innerHTML = `
                <button ${bookCurrentPage <= 1 ? 'disabled' : ''} id="bookPrevBtn">上一页</button>
                <span>第 ${bookCurrentPage} / ${bookTotalPages} 页</span>
                <button ${bookCurrentPage >= bookTotalPages ? 'disabled' : ''} id="bookNextBtn">下一页</button>
            `;
            document.getElementById('bookPrevBtn')?.addEventListener('click', function() {
                if (bookCurrentPage > 1) loadBookReviews(bookCurrentPage - 1);
            });
            document.getElementById('bookNextBtn')?.addEventListener('click', function() {
                if (bookCurrentPage < bookTotalPages) loadBookReviews(bookCurrentPage + 1);
            });
        }

        // 初始加载
        loadChapterReviews(1);
        loadBookReviews(1);
    </script>
</body>
</html>
